name: dev tests

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - CONTRIBUTING.md
      - LICENSE
      - README.md
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6  # docs: https://github.com/marketplace/actions/checkout
      - uses: astral-sh/setup-uv@v6  # docs: https://github.com/marketplace/actions/astral-sh-setup-uv
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Run tests
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          API_BASE_URL: "https://api-dev.microbiomedata.org"  # dev
        # Note: Our baseline pytest CLI options are in the `[tool.pytest]` section of `pyproject.toml`.
        run: uv run pytest -x nmdc_api_utilities/
      - name: Create Issue
        if: failure() && github.event.pull_request == null && github.event_name == 'schedule'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.create({
              owner,
              repo,
              title: "notebook_api_utilities dev tests failed",
              body: "The dev tests have failed in the latest run. Please investigate the issue.",
              labels: ["report", "automated issue"]
            });
