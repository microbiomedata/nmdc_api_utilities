name: Run pre-commit hooks & push changes

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'


permissions:
  contents: write


jobs:
  run-hooks:
    name: Run Pre-Commit hooks and push changes back
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install pre-commit
        run: uv sync --locked --group dev

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files || true

      - name: Run mypy (blocking)
        run: uv run mypy

      - name: Commit and push changes if pre-commit made any modifications
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "precommit: reformat"
            git push
          fi
