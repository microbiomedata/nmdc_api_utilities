name: Run pre-commit hooks & push changes

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'


permissions:
  contents: write


jobs:
  run-hooks:
    name: Run Pre-Commit hooks and push changes back
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v6  # docs: https://github.com/marketplace/actions/checkout
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6  # docs: https://github.com/marketplace/actions/astral-sh-setup-uv
        with:
          python-version: 3.12
          enable-cache: true

      - name: Install pre-commit
        run: uv sync --group dev

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files || true

      - name: Commit and push changes if pre-commit made any modifications
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "precommit: reformat"
            git push
          fi
