name: documentation

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6  # docs: https://github.com/marketplace/actions/checkout
      - uses: actions/setup-python@v6  # docs: https://github.com/marketplace/actions/setup-python
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install sphinx sphinx_rtd_theme myst_parser nbsphinx
          pip install ipykernel
          pip install .
          python -m ipykernel install --user --name python3 --display-name "Python 3"
      - name: Sphinx build
        run: |
          sphinx-build -v docs build/html
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/html
          force_orphan: true
